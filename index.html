<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#6b35c5">
  <title>Rita och gissa!</title>
  <style>
    :root { color-scheme: light; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; --ink:#251642; --purple:#6b35c5; }
    * { box-sizing: border-box; }
    body { min-height:100vh; margin:0; color:var(--ink); text-align:center; background-color:#fff6cd; background-image:radial-gradient(circle at 10% 15%,#f64c95 0 5px,transparent 6px),radial-gradient(circle at 88% 12%,#2e78e8 0 6px,transparent 7px),radial-gradient(circle at 20% 82%,#129265 0 5px,transparent 6px),radial-gradient(circle at 78% 75%,#ffae00 0 6px,transparent 7px),linear-gradient(35deg,transparent 48%,#9a69e5 49% 52%,transparent 53%); background-size:140px 140px,180px 180px,165px 165px,210px 210px,190px 190px; }
    main { width:min(100% - 1.5rem,980px); margin:auto; padding:clamp(1rem,5vw,3.5rem) 0 2rem; }
    .panel { background:rgb(255 255 255 / 95%); border:4px solid var(--ink); border-radius:28px; padding:clamp(1.1rem,4vw,2.75rem); box-shadow:0 11px 0 var(--ink); }
    h1 { margin:0; color:var(--purple); font-size:clamp(2.5rem,8vw,5.2rem); line-height:1; text-shadow:3px 3px #ffd448; }
    h2 { margin:.4rem 0 1rem; font-size:clamp(1.5rem,4vw,2.2rem); }
    .intro { margin:.8rem auto 1.6rem; font-size:clamp(1rem,2.5vw,1.3rem); font-weight:700; }
    .setup-grid { display:grid; gap:1.5rem; text-align:left; }
    fieldset { min-width:0; margin:0; padding:1rem; border:3px solid #d8c9ee; border-radius:20px; }
    legend { padding:0 .45rem; font-size:1.15rem; font-weight:900; }
    .choices { display:grid; gap:.65rem; }
    .player-choices { grid-template-columns:repeat(4,1fr); }
    .player-ages { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:.7rem; }
    .player-age { display:grid; grid-template-columns:auto 1fr; align-items:center; gap:.7rem; font-weight:850; }
    .player-age select { width:100%; min-height:48px; padding:.55rem; border:3px solid var(--ink); border-radius:12px; color:var(--ink); background:#fff; font-family:inherit; font-size:1rem; font-weight:800; }
    .choice input { position:absolute; opacity:0; pointer-events:none; }
    .choice span { display:grid; place-items:center; min-height:54px; padding:.55rem; border:3px solid var(--ink); border-radius:14px; background:#fff; font-weight:850; cursor:pointer; box-shadow:0 4px 0 var(--ink); }
    .choice input:checked + span { color:#fff; background:var(--purple); transform:translateY(3px); box-shadow:0 1px 0 var(--ink); }
    .choice input:focus-visible + span, .player-age select:focus-visible, button:focus-visible { outline:5px solid #ffbd00; outline-offset:3px; }
    button { border:3px solid var(--ink); border-radius:18px; color:#fff; background:var(--purple); font:850 clamp(1.15rem,3vw,1.55rem)/1.1 inherit; cursor:pointer; box-shadow:0 6px 0 var(--ink); touch-action:manipulation; }
    button:active { transform:translateY(5px); box-shadow:0 1px 0 var(--ink); }
    .start { width:min(100%,440px); min-height:68px; margin:1.5rem auto 0; background:#087a4d; }
    .game-head { display:flex; align-items:center; justify-content:space-between; gap:1rem; }
    .back { min-height:48px; padding:.6rem .9rem; color:var(--ink); background:#fff; font-size:1rem; }
    .turn { margin:1.25rem 0 .3rem; color:#5b3a87; font-size:clamp(1.2rem,3vw,1.55rem); font-weight:900; }
    .card { min-height:240px; display:grid; place-content:center; gap:.8rem; padding:clamp(1rem,4vw,2rem); border:4px dashed var(--purple); border-radius:24px; background:#f7efff; }
    .eyebrow,.remaining { margin:0; font-weight:850; }
    .eyebrow { color:var(--purple); letter-spacing:.08em; text-transform:uppercase; }
    #prompt { margin:0; font-size:clamp(1.65rem,5vw,3rem); line-height:1.15; font-weight:900; text-wrap:balance; }
    .next { width:min(100%,460px); min-height:76px; margin:1.25rem 0 .5rem; background:#d51e70; }
    .message { min-height:1.5em; margin:.6rem 0 0; font-weight:800; color:#08704a; }
    .hidden { display:none; }
    footer { margin-top:1.5rem; font-weight:750; }
    @media (max-width:700px) { .player-ages{grid-template-columns:1fr}.panel{border-radius:22px}.game-head{align-items:flex-start} }
    @media (max-width:390px) { .player-choices{grid-template-columns:repeat(3,1fr)} }
    @media (prefers-reduced-motion:reduce) { * { scroll-behavior:auto!important; transition:none!important; } }
  </style>
</head>
<body>
  <main>
    <section class="panel" id="setup" aria-labelledby="title">
      <h1 id="title">Rita och gissa!</h1>
      <p class="intro">Välj hur många som spelar och en egen ålder för varje spelare. Uppdragen är enkla, tydliga och roliga att rita!</p>
      <div class="setup-grid">
        <fieldset>
          <legend>Hur många spelar?</legend>
          <div class="choices player-choices">
            <label class="choice"><input type="radio" name="players" value="2" checked><span>2</span></label>
            <label class="choice"><input type="radio" name="players" value="3"><span>3</span></label>
            <label class="choice"><input type="radio" name="players" value="4"><span>4</span></label>
            <label class="choice"><input type="radio" name="players" value="5"><span>5</span></label>
            <label class="choice"><input type="radio" name="players" value="6"><span>6</span></label>
            <label class="choice"><input type="radio" name="players" value="7"><span>7</span></label>
            <label class="choice"><input type="radio" name="players" value="8"><span>8</span></label>
          </div>
        </fieldset>
        <fieldset>
          <legend>Välj ålder för varje spelare</legend>
          <div class="player-ages" id="player-ages"></div>
        </fieldset>
      </div>
      <button class="start" id="start" type="button">Starta spelet</button>
      <footer>Rita snällt, gissa fritt och hjälp varandra. ✊🌈</footer>
    </section>

    <section class="panel hidden" id="game" aria-labelledby="game-title">
      <div class="game-head"><div><p class="eyebrow" id="age-label"></p><h2 id="game-title">Dags att rita!</h2></div><button class="back" id="back" type="button">← Ändra val</button></div>
      <p class="turn" id="turn">Spelare 1 ritar</p>
      <div class="card" aria-live="polite" aria-atomic="true">
        <p class="eyebrow">Ditt uppdrag</p><p id="prompt">Tryck för ett rituppdrag!</p><p class="remaining" id="remaining"></p>
      </div>
      <button class="next" id="next" type="button">Visa nästa uppdrag</button>
      <p class="message" id="message" aria-live="polite"></p>
    </section>
  </main>
  <script>
    const commonActions = ["äter en glass","har en stor hatt","åker cykel","badar i ett badkar","flyger med ballonger","dansar på ett bord","sover i en säng","spelar trummor","bygger ett sandslott","hoppar i en vattenpöl","bakar en tårta","kramar en nalle","läser en bok","åker i en raket","har randiga strumpor","fiskar i en sjö","sjunger i en mikrofon","gömmer sig bakom ett träd","balanserar en banan","målar en regnbåge","åker pulka","borstar tänderna","sparkar en boll","planterar en blomma","äter en smörgås"];
    const levels = {
      age6: { label:"6–8 år", subjects:["En katt","En hund","En kanin","En mus","En groda","En ko","En gris","En häst","Ett lejon","En elefant","En apa","En pingvin","En krokodil","En drake","En robot","Ett spöke","En prinsessa","En pirat","En dinosaurie","En snögubbe"], actions:commonActions },
      age9: { label:"9–12 år", subjects:["En rymdkatt","En superhjälte","En trollkarl","En sjöjungfru","En vampyr","En enhörning","En alien","En detektiv","En ninja","En astronaut","En robot","En sköldpadda","En fågel","Ett troll","En uppfinnare","En riddare","En bläckfisk","En yeti","En pirat","En drake"], actions:commonActions },
      age13: { label:"13–15 år", subjects:["En zombielärare","En filmstjärna","En vampyr","En riddare","En spökpirat","En tidsresenär","En superhjälte","En rockstjärna","En hemlig agent","En alienkock","En draktränare","En kunglig lama","En fotograf","En sjöjungfru","En ninjabagare","En astronaut","En robotkanin","En trollkarl","En rymdviking","En björn"], actions:commonActions },
      age15: { label:"15–18 år", subjects:["En punkprinsessa","En detektiv","En superhjälte","En viking","En DJ","En vampyr","En reporter","En zombie","En robot","En sjöjungfru","En trollkarl","En gorilla","En alien","En ninja","En drake","En pirat","En agentkanin","En yeti","En cyborgkock","Ett spöke"], actions:commonActions },
      adult: { label:"Vuxen", subjects:["En viking","En gorilla","En superhjälte","En trollkarl","En pingvin","En astronaut","En hemlig agent","En robot","En piratkapten","En krokodil","En bagare","En detektivlama","En riddare","En vampyr","En bläckfisk","En zombiebrandman","En cirkusdirektör","En sjöjungfru","En cowboy","En kock"], actions:commonActions }
    };
    const decks = {}, setup=document.querySelector("#setup"), game=document.querySelector("#game"), promptEl=document.querySelector("#prompt"), remaining=document.querySelector("#remaining"), turnEl=document.querySelector("#turn"), message=document.querySelector("#message"), ageLabel=document.querySelector("#age-label"), playerAges=document.querySelector("#player-ages");
    let players=[], playerCount=2, currentPlayer=0;
    function renderPlayerAges() {
      playerCount=Number(document.querySelector('[name="players"]:checked').value);
      const previous=[...playerAges.querySelectorAll("select")].map(select=>select.value);
      playerAges.innerHTML=Array.from({length:playerCount},(_,index)=>`<label class="player-age"><span>Spelare ${index+1}</span><select aria-label="Ålder för spelare ${index+1}">${Object.entries(levels).map(([key,level])=>`<option value="${key}" ${previous[index]===key?"selected":""}>${level.label}</option>`).join("")}</select></label>`).join("");
    }
    function buildDeck(level) { const cards=level.subjects.flatMap(subject=>level.actions.map(action=>`${subject} som ${action}`)); if(cards.length!==500||new Set(cards).size!==500) throw new Error(`${level.label} måste ha 500 unika uppdrag`); for(let i=cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]];} return cards; }
    function draw() { currentPlayer=currentPlayer%playerCount+1; const activeLevel=players[currentPlayer-1], level=levels[activeLevel]; if(!decks[activeLevel]?.length) decks[activeLevel]=buildDeck(level); turnEl.textContent=`Spelare ${currentPlayer} ritar`; ageLabel.textContent=`Spelare ${currentPlayer} · ${level.label}`; promptEl.textContent=decks[activeLevel].pop(); remaining.textContent=`${decks[activeLevel].length} av 500 uppdrag kvar för ${level.label}`; message.textContent=currentPlayer===playerCount?"Sedan börjar vi om från spelare 1 – alla får lika många turer!":""; }
    document.querySelectorAll('[name="players"]').forEach(input=>input.addEventListener("change",renderPlayerAges));
    document.querySelector("#start").addEventListener("click",()=>{ players=[...playerAges.querySelectorAll("select")].map(select=>select.value); playerCount=players.length; currentPlayer=0; setup.classList.add("hidden"); game.classList.remove("hidden"); draw(); document.querySelector("#next").focus(); });
    document.querySelector("#next").addEventListener("click",draw);
    document.querySelector("#back").addEventListener("click",()=>{ game.classList.add("hidden"); setup.classList.remove("hidden"); document.querySelector("#start").focus(); });
    renderPlayerAges();
  </script>
</body>
</html>
