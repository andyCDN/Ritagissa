<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#6b35c5">
  <title>Rita och gissa!</title>
  <style>
    :root { color-scheme:light; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; --ink:#21123d; --purple:#6932bd; --pink:#e72f7f; --blue:#2878d8; --green:#087a4d; --yellow:#ffd23f; --paper:#fffdf4; --pixel:4px; }
    * { box-sizing: border-box; }
    body { min-height:100vh; margin:0; color:var(--ink); text-align:center; background-color:#fff2a8; background-image:linear-gradient(90deg,var(--pink) 8px,transparent 8px),linear-gradient(var(--blue) 8px,transparent 8px),linear-gradient(90deg,transparent 24px,var(--green) 24px 32px,transparent 32px),linear-gradient(transparent 24px,#f6a800 24px 32px,transparent 32px); background-size:64px 64px,64px 64px,96px 96px,96px 96px; image-rendering:pixelated; }
    main { position:relative; width:min(100% - 1.5rem,980px); margin:auto; padding:clamp(1rem,5vw,3.5rem) 0 2rem; }
    .panel { position:relative; background:var(--paper); border:var(--pixel) solid var(--ink); border-radius:0; padding:clamp(1.1rem,4vw,2.75rem); box-shadow:4px 4px 0 var(--yellow),8px 8px 0 var(--pink),12px 12px 0 var(--ink); }
    .panel::before,.panel::after { content:""; position:absolute; width:12px; height:12px; background:var(--yellow); box-shadow:4px 4px 0 var(--pink); }
    .panel::before { top:12px; left:12px; } .panel::after { right:12px; bottom:12px; }
    .pixel-banner { display:flex; align-items:center; justify-content:center; gap:1rem; margin:0 0 1rem; color:var(--pink); font-size:.9rem; font-weight:900; letter-spacing:.14em; text-transform:uppercase; }
    .pixel-star { width:4px; height:4px; flex:0 0 4px; background:var(--yellow); box-shadow:0 -8px 0 var(--yellow),0 8px 0 var(--yellow),-8px 0 0 var(--yellow),8px 0 0 var(--yellow),-4px -4px 0 var(--pink),4px -4px 0 var(--pink),-4px 4px 0 var(--pink),4px 4px 0 var(--pink); animation:pixel-blink 1.2s steps(2,end) infinite; }
    h1,h2,.pixel-banner,button,legend { font-family:"Courier New",ui-monospace,monospace; }
    h1 { margin:0; color:var(--purple); font-size:clamp(2.3rem,8vw,4.8rem); line-height:1.05; letter-spacing:-.02em; text-shadow:3px 3px 0 var(--yellow),6px 6px 0 var(--pink); }
    h2 { margin:.4rem 0 1rem; font-size:clamp(1.5rem,4vw,2.2rem); }
    .intro { max-width:760px; margin:.9rem auto 1.7rem; font-size:clamp(1rem,2.5vw,1.25rem); line-height:1.55; font-weight:650; }
    .setup-grid { display:grid; gap:1.5rem; text-align:left; }
    fieldset { min-width:0; margin:0; padding:1rem; border:4px solid var(--ink); border-radius:0; background:#f8f3ff; }
    legend { padding:.25rem .55rem; border:4px solid var(--ink); background:var(--yellow); box-shadow:4px 4px 0 var(--ink); font-size:1.05rem; font-weight:900; text-transform:uppercase; }
    .choices { display:grid; gap:.65rem; }
    .player-choices { grid-template-columns:repeat(4,1fr); }
    .player-ages { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:.7rem; }
    .player-age { display:grid; grid-template-columns:auto minmax(0,1fr); align-items:center; gap:.45rem .7rem; font-weight:850; }
    .player-age span { grid-row:1 / 3; }
    .player-age input, .player-age select { width:100%; min-height:46px; padding:.5rem; border:4px solid var(--ink); border-radius:0; color:var(--ink); background:#fff; box-shadow:inset 4px 4px 0 #e5dbf4; font-family:inherit; font-size:1rem; font-weight:800; }
    .choice input { position:absolute; opacity:0; pointer-events:none; }
    .choice span { display:grid; place-items:center; min-height:54px; padding:.55rem; border:4px solid var(--ink); border-radius:0; background:#fff; font-weight:850; cursor:pointer; box-shadow:4px 4px 0 var(--ink); }
    .choice input:checked + span { color:#fff; background:var(--purple); transform:translateY(3px); box-shadow:0 1px 0 var(--ink); }
    .choice input:focus-visible + span, .player-age input:focus-visible, .player-age select:focus-visible, button:focus-visible { outline:5px solid #ffbd00; outline-offset:3px; }
    button { border:4px solid var(--ink); border-radius:0; color:#fff; background:var(--purple); font:850 clamp(1.05rem,3vw,1.4rem)/1.2 "Courier New",ui-monospace,monospace; cursor:pointer; box-shadow:inset 4px 4px 0 rgb(255 255 255 / 28%),inset -4px -4px 0 rgb(0 0 0 / 22%),6px 6px 0 var(--ink); touch-action:manipulation; clip-path:polygon(8px 0,calc(100% - 8px) 0,calc(100% - 8px) 4px,100% 4px,100% calc(100% - 8px),calc(100% - 4px) calc(100% - 8px),calc(100% - 4px) 100%,8px 100%,8px calc(100% - 4px),4px calc(100% - 4px),4px calc(100% - 8px),0 calc(100% - 8px),0 8px,4px 8px,4px 4px,8px 4px); }
    button:hover { filter:brightness(1.12) saturate(1.15); transform:translate(-2px,-2px); box-shadow:inset 4px 4px 0 rgb(255 255 255 / 32%),inset -4px -4px 0 rgb(0 0 0 / 22%),8px 8px 0 var(--ink); }
    button:active { transform:translateY(5px); box-shadow:0 1px 0 var(--ink); }
    .start { width:min(100%,440px); min-height:68px; margin:1.5rem auto 0; background:#087a4d; }
    .game-head { display:flex; align-items:center; justify-content:space-between; gap:1rem; }
    .back { min-height:48px; padding:.6rem .9rem; color:var(--ink); background:#fff; font-size:1rem; }
    .turn { margin:1.25rem 0 .3rem; color:#5b3a87; font-size:clamp(1.2rem,3vw,1.55rem); font-weight:900; }
    .card { position:relative; min-height:240px; display:grid; place-content:center; gap:.8rem; padding:clamp(1rem,4vw,2rem); border:8px double var(--purple); border-radius:0; background-color:#f3e8ff; background-image:linear-gradient(90deg,rgb(105 50 189 / 7%) 4px,transparent 4px),linear-gradient(rgb(105 50 189 / 7%) 4px,transparent 4px); background-size:20px 20px; box-shadow:inset 0 0 0 4px #fff,8px 8px 0 var(--ink); }
    .card::before,.card::after { content:""; position:absolute; width:12px; height:12px; background:var(--pink); border:4px solid var(--ink); }
    .card::before { top:8px; left:8px; } .card::after { right:8px; bottom:8px; }
    .eyebrow { margin:0; font-weight:850; }
    .eyebrow { color:var(--purple); letter-spacing:.08em; text-transform:uppercase; }
    #prompt { margin:0; font-size:clamp(1.65rem,5vw,3rem); line-height:1.25; font-weight:900; text-shadow:2px 2px 0 #fff; text-wrap:balance; }
    .pixel-action { display:inline-grid; place-items:center; flex:0 0 1.65em; width:1.65em; height:1.65em; border:3px solid currentColor; background:var(--yellow); color:var(--ink); font-size:1.25em; line-height:1; box-shadow:3px 3px 0 var(--ink); }
    .actions { display:flex; justify-content:center; align-items:stretch; gap:1rem; margin-top:1rem; }
    .actions button { display:flex; align-items:center; justify-content:center; gap:.7rem; min-height:84px; padding:.65rem 1rem; }
    .action-copy { display:grid; gap:.25rem; text-align:left; }
    .action-copy small { font-family:system-ui,-apple-system,sans-serif; font-size:.78em; line-height:1.25; font-weight:700; letter-spacing:0; }
    .next { width:min(100%,380px); background:var(--green); }
    .skip-info { max-width:650px; margin:1.15rem auto .7rem; padding:.75rem; border:4px solid var(--ink); background:#fff1a8; box-shadow:4px 4px 0 var(--ink); line-height:1.45; font-weight:750; }
    .skip { width:min(100%,330px); color:var(--ink); background:#fff; }
    .message { min-height:1.5em; margin:.6rem 0 0; font-weight:800; color:#08704a; }
    .hidden { display:none; }
    footer { margin-top:1.5rem; padding-top:1rem; border-top:4px dashed var(--purple); font-weight:750; }
    @keyframes pixel-blink { 50% { opacity:.25; transform:scale(.7); } }
    @media (max-width:700px) { .player-ages{grid-template-columns:1fr}.game-head{align-items:flex-start}.actions{flex-direction:column;align-items:center} }
    @media (max-width:390px) { .player-choices{grid-template-columns:repeat(3,1fr)} }
    @media (prefers-reduced-motion:reduce) { * { scroll-behavior:auto!important; transition:none!important; animation:none!important; } }
  </style>
</head>
<body>
  <main>
    <section class="panel" id="setup" aria-labelledby="title">
      <h1 id="title">Rita och gissa!</h1>
      <p class="intro">Välj antal spelare, valfritt namn och ålder.</p>
      <div class="setup-grid">
        <fieldset>
          <legend>Hur många spelar?</legend>
          <div class="choices player-choices">
            <label class="choice"><input type="radio" name="players" value="2" checked><span>2</span></label>
            <label class="choice"><input type="radio" name="players" value="3"><span>3</span></label>
            <label class="choice"><input type="radio" name="players" value="4"><span>4</span></label>
            <label class="choice"><input type="radio" name="players" value="5"><span>5</span></label>
            <label class="choice"><input type="radio" name="players" value="6"><span>6</span></label>
            <label class="choice"><input type="radio" name="players" value="7"><span>7</span></label>
            <label class="choice"><input type="radio" name="players" value="8"><span>8</span></label>
          </div>
        </fieldset>
        <fieldset>
          <legend>Välj ålder för varje spelare</legend>
          <div class="player-ages" id="player-ages"></div>
        </fieldset>
      </div>
      <button class="start" id="start" type="button">▶ Starta spelet</button>
      <footer>Rita snällt, gissa fritt och hjälp varandra. ✊🌈</footer>
    </section>

    <section class="panel hidden" id="game" aria-labelledby="game-title">
      <div class="pixel-banner" aria-hidden="true"><span class="pixel-star"></span><span>Ritläge</span><span class="pixel-star"></span></div>
      <div class="game-head"><div><p class="eyebrow" id="age-label"></p><h2 id="game-title">Dags att rita!</h2></div><button class="back" id="back" type="button">◀ Ändra val</button></div>
      <p class="turn" id="turn">Spelare 1 ritar</p>
      <div class="card" aria-live="polite" aria-atomic="true">
        <p class="eyebrow">Ditt uppdrag</p><p id="prompt">Tryck för ett rituppdrag!</p>
      </div>
      <p class="skip-info" id="action-guide"><strong>Välj vad som händer:</strong> Byt bara kortet eller avsluta turen.</p>
      <div class="actions">
        <button class="next" id="next" type="button" aria-label="Klar, gå till nästa spelare" aria-describedby="action-guide"><span class="pixel-action" aria-hidden="true">▶</span><span class="action-copy"><span>Klar! Nästa spelare</span><small>Nästa person får rita</small></span></button>
        <button class="skip" id="skip" type="button" aria-label="Byt uppdrag för samma spelare" aria-describedby="action-guide"><span class="pixel-action" aria-hidden="true">↻</span><span class="action-copy"><span>Byt uppdrag</span><small>Samma spelare fortsätter</small></span></button>
      </div>
      <p class="message" id="message" aria-live="polite"></p>
    </section>
  </main>
  <script>
    const commonFigures = ["katt","hund","kanin","mus","groda","gris","häst","björn","fågel","fisk","robot","spöke","dinosaurie","pirat","astronaut"];
    const commonExtras = [
      {word:"hatt",relation:"med"},{word:"krona",relation:"med"},{word:"ballong",relation:"med"},{word:"glass",relation:"med"},{word:"bok",relation:"med"},{word:"boll",relation:"med"},
      {word:"bil",relation:"i"},{word:"båt",relation:"i"},{word:"raket",relation:"i"},
      {word:"stol",relation:"på"},{word:"cykel",relation:"på"},{word:"måne",relation:"på"},
      {word:"paraply",relation:"under"},{word:"träd",relation:"under"},{word:"blomma",relation:"bredvid"}
    ];
    const levelContent = {
      age6: {
        label:"6–8 år",
        figures:["lejon","elefant","apa","pingvin","ko","får","höna","anka","bi","nyckelpiga","sköldpadda","räv","uggla","panda","hamster","enhörning","prinsessa","clown","barn","häxa","snögubbe","docka","nalle","banan","äpple"],
        extras:[{word:"tårta",relation:"med"},{word:"tandborste",relation:"med"},{word:"ryggsäck",relation:"med"},{word:"sko",relation:"med"},{word:"kopp",relation:"i"},{word:"säng",relation:"i"},{word:"tåg",relation:"i"},{word:"gunga",relation:"på"},{word:"moln",relation:"på"},{word:"matta",relation:"på"},{word:"bord",relation:"under"},{word:"regnbåge",relation:"under"},{word:"hus",relation:"bredvid"},{word:"solros",relation:"bredvid"},{word:"slott",relation:"bredvid"}]
      },
      age9: {
        label:"9–12 år",
        figures:["krokodil","giraff","snigel","fjäril","drake","haj","bläckfisk","val","zebra","krabba","säl","ekorre","älg","papegoja","flamingo","spindel","delfin","sjöhäst","ninja","detektiv","sjöjungfru","monster","troll","fe","viking"],
        extras:[{word:"gitarr",relation:"med"},{word:"kamera",relation:"med"},{word:"pizza",relation:"med"},{word:"skattkista",relation:"med"},{word:"ficklampa",relation:"med"},{word:"ubåt",relation:"i"},{word:"helikopter",relation:"i"},{word:"koja",relation:"i"},{word:"skateboard",relation:"på"},{word:"surfbräda",relation:"på"},{word:"berg",relation:"på"},{word:"bro",relation:"under"},{word:"vattenfall",relation:"under"},{word:"kaktus",relation:"bredvid"},{word:"vulkan",relation:"bredvid"}]
      },
      age13: {
        label:"13–15 år",
        figures:["tiger","känguru","varg","kamel","gorilla","vampyr","zombie","riddare","superhjälte","kung","drottning","cowboy","musiker","kock","bagare","läkare","lärare","brandman","fotograf","trummis","sångare","dansare","pilot","trollkarl","samuraj"],
        extras:[{word:"hörlur",relation:"med"},{word:"mikrofon",relation:"med"},{word:"spelkontroll",relation:"med"},{word:"mobil",relation:"med"},{word:"hamburgare",relation:"med"},{word:"husbil",relation:"i"},{word:"flygplan",relation:"i"},{word:"biograf",relation:"i"},{word:"moped",relation:"på"},{word:"scen",relation:"på"},{word:"tak",relation:"på"},{word:"gatlykta",relation:"under"},{word:"bro",relation:"under"},{word:"staty",relation:"bredvid"},{word:"fontän",relation:"bredvid"}]
      },
      age15: {
        label:"15–18 år",
        figures:["filmstjärna","rockstjärna","gamer","cyborg","samuraj","fotograf","regissör","sångare","dansare","trummis","pilot","trollkarl","detektiv","ninja","vampyr","zombie","superhjälte","viking","cowboy","kock","läkare","lärare","brandman","rappare","alien"],
        extras:[{word:"solglasögon",relation:"med"},{word:"elgitarr",relation:"med"},{word:"kaffekopp",relation:"med"},{word:"mobil",relation:"med"},{word:"resväska",relation:"med"},{word:"taxi",relation:"i"},{word:"husbil",relation:"i"},{word:"hiss",relation:"i"},{word:"motorcykel",relation:"på"},{word:"scen",relation:"på"},{word:"tak",relation:"på"},{word:"gatlykta",relation:"under"},{word:"bro",relation:"under"},{word:"bankomat",relation:"bredvid"},{word:"staty",relation:"bredvid"}]
      },
      adult: {
        label:"Vuxen",
        figures:["turist","domare","bonde","kapten","frisör","brevbärare","snickare","målare","mekaniker","tandläkare","bibliotekarie","fotograf","kock","lärare","läkare","pilot","detektiv","musiker","bagare","brandman","kung","drottning","viking","cowboy","clown"],
        extras:[{word:"kaffekopp",relation:"med"},{word:"dammsugare",relation:"med"},{word:"stekpanna",relation:"med"},{word:"resväska",relation:"med"},{word:"väckarklocka",relation:"med"},{word:"tvättmaskin",relation:"i"},{word:"kundvagn",relation:"i"},{word:"taxi",relation:"i"},{word:"kontorsstol",relation:"på"},{word:"gräsklippare",relation:"på"},{word:"soffa",relation:"på"},{word:"gatlykta",relation:"under"},{word:"balkong",relation:"under"},{word:"grill",relation:"bredvid"},{word:"blomkruka",relation:"bredvid"}]
      }
    };
    const compoundPrefixes = ["banan","glass","pizza","taco","katt","hund","kanin","grod","gris","dinosaurie","robot","spök","regnbågs","prinsess","pirat","rump","prutt","korv","pannkaks","popcorn"];
    const compoundEndings = ["båt","fontän","bil","hus","hatt","sko","stol","säng","cykel","raket","slott","tårta","boll","paraply","ryggsäck","gitarr","kamera","telefon","krona","torn"];
    const accessoryFigures = ["Rumpa","Banan","Glass","Pizza","Katt","Hund","Kanin","Groda","Gris","Dinosaurie","Robot","Spöke","Prinsessa","Pirat","Clown","Astronaut","Superhjälte","Kung","Drottning","Viking","Cowboy","Kock","Lärare","Apa","Pingvin"];
    const accessories = ["solglasögon","krona","hatt","mustasch","ballong","ryggsäck","rosett","stövlar","vingar","paraply"];
    const actionFigures = ["prinsessan","katten","hunden","kaninen","grodan","grisen","dinosaurien","roboten","spöket","piraten","clownen","astronauten","superhjälten","kungen","drottningen","vikingen","cowboyen","kocken","läraren","apan","pingvinen","bananen","glassen","pizzan","rumpan","båten","bilen","raketen","månen","solen","blomman","bollen","hatten","skon","tårtan"];
    const sillyActions = ["pruttar","dansar","sover","hoppar","vinkar","skrattar","nyser","sjunger","snarkar","flyger"];
    const sillyPrompts = [
      ...compoundPrefixes.flatMap(prefix=>compoundEndings.map(ending=>`${prefix}${ending}`)),
      ...accessoryFigures.flatMap(figure=>accessories.map(accessory=>`${figure} med ${accessory}`)),
      ...actionFigures.flatMap(figure=>sillyActions.map(action=>`${figure[0].toUpperCase()+figure.slice(1)} ${action}`))
    ].map(prompt=>prompt[0].toUpperCase()+prompt.slice(1));
    const sillyPromptSet = new Set(sillyPrompts);
    const levels = Object.fromEntries(Object.entries(levelContent).map(([key,content])=>[
      key,{label:content.label,figures:[...commonFigures,...content.figures],extras:[...commonExtras,...content.extras]}
    ]));
    const decks = {}, setup=document.querySelector("#setup"), game=document.querySelector("#game"), promptEl=document.querySelector("#prompt"), turnEl=document.querySelector("#turn"), message=document.querySelector("#message"), ageLabel=document.querySelector("#age-label"), playerAges=document.querySelector("#player-ages");
    let players=[], playerCount=2, currentPlayer=0;
    function loadSettings() { try { return JSON.parse(localStorage.getItem("ritagissa-settings"))||{}; } catch { return {}; } }
    function saveSettings() { localStorage.setItem("ritagissa-settings",JSON.stringify({playerCount,players})); }
    function playerName(index) { return String(players[index]?.name||"").trim()||`Spelare ${index+1}`; }
    function renderPlayerAges() {
      playerCount=Number(document.querySelector('[name="players"]:checked').value);
      const previous=[...playerAges.querySelectorAll(".player-age")].map(row=>({name:row.querySelector("input").value,age:row.querySelector("select").value}));
      playerAges.replaceChildren(...Array.from({length:playerCount},(_,index)=>{
        const row=document.createElement("label"); row.className="player-age";
        const label=document.createElement("span"); label.textContent=`Spelare ${index+1}`;
        const name=document.createElement("input"); name.type="text"; name.maxLength=20; name.placeholder="Namn (valfritt)"; name.setAttribute("aria-label",`Namn för spelare ${index+1}`); name.value=previous[index]?.name||players[index]?.name||"";
        const age=document.createElement("select"); age.setAttribute("aria-label",`Ålder för spelare ${index+1}`);
        for(const [key,level] of Object.entries(levels)){const option=document.createElement("option"); option.value=key; option.textContent=level.label; age.append(option);}
        age.value=previous[index]?.age||players[index]?.age||"age6";
        row.append(label,name,age); return row;
      }));
    }
    function buildDeck(level) {
      const regularPrompts=level.figures.flatMap(figure=>level.extras.filter(extra=>extra.word!==figure).map(extra=>`${figure[0].toUpperCase()+figure.slice(1)} ${extra.relation} ${extra.word}`)).filter(prompt=>!sillyPromptSet.has(prompt));
      const prompts=[...regularPrompts,...sillyPrompts];
      if(level.figures.length!==40||level.extras.length!==30||sillyPrompts.length!==1000||new Set(sillyPrompts).size!==1000||regularPrompts.length<1100||new Set(prompts).size!==prompts.length) throw new Error(`${level.label} har ogiltigt innehåll`);
      for(let i=prompts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[prompts[i],prompts[j]]=[prompts[j],prompts[i]];} return prompts;
    }
    function showPrompt() { const activeLevel=players[currentPlayer-1].age; if(!decks[activeLevel]?.length) decks[activeLevel]=buildDeck(levels[activeLevel]); promptEl.textContent=decks[activeLevel].pop(); }
    function draw() { currentPlayer=currentPlayer%playerCount+1; const level=levels[players[currentPlayer-1].age],name=playerName(currentPlayer-1); turnEl.textContent=`${name} ritar`; ageLabel.textContent=`${name} · ${level.label}`; message.textContent=currentPlayer===playerCount?"Sedan börjar vi om från den första spelaren – alla får lika många turer!":""; showPrompt(); }
    document.querySelectorAll('[name="players"]').forEach(input=>input.addEventListener("change",renderPlayerAges));
    document.querySelector("#start").addEventListener("click",()=>{ players=[...playerAges.querySelectorAll(".player-age")].map(row=>({name:row.querySelector("input").value,age:row.querySelector("select").value})); playerCount=players.length; saveSettings(); currentPlayer=0; setup.classList.add("hidden"); game.classList.remove("hidden"); draw(); document.querySelector("#next").focus(); });
    document.querySelector("#next").addEventListener("click",draw);
    document.querySelector("#skip").addEventListener("click",showPrompt);
    document.querySelector("#back").addEventListener("click",()=>{ game.classList.add("hidden"); setup.classList.remove("hidden"); document.querySelector("#start").focus(); });
    const saved=loadSettings(); players=Array.isArray(saved.players)?saved.players:[]; playerCount=Math.min(8,Math.max(2,Number(saved.playerCount)||2)); const playerRadio=document.querySelector(`[name="players"][value="${playerCount}"]`); if(playerRadio) playerRadio.checked=true; renderPlayerAges();
  </script>
</body>
</html>
